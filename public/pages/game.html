<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Game</title><link rel='stylesheet' href='/css/style.css'></head><body><div class='top'><div class='wrap'><b>Playsculpt</b><div class='nav'><a href='/landing.html'>Home</a><a href='/games.html'>Games</a><a href='/createonplaysculpt.html'>Create</a><a href='/marketplace.html'>Marketplace</a><a href='/groups.html'>Groups</a><a href='/dashboard.html'>Dashboard</a><a href='/login.html'>Login / Account</a></div></div></div><div class='wrap'><div class='panel'><h2 id='title'></h2><p id='meta'></p><button class='btn' id='fav'>Favorite</button><button class='btn'>Report</button><div id='editorCanvas'></div><div class='panel'>Screenshots and comments coming soon.</div></div></div><script src='/js/main.js'></script><script type='module'>import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';const id=location.pathname.split('/').pop();const g=await api('/api/games/'+id);title.textContent=g.name;meta.textContent=`By ${g.creator} | Visits ${g.visits||0} | Likes ${g.likes||0}`;const s=new THREE.Scene();s.background=new THREE.Color('#97c4ff');const c=new THREE.PerspectiveCamera(70,2,0.1,1000);const r=new THREE.WebGLRenderer();editorCanvas.appendChild(r.domElement);const l=new THREE.HemisphereLight(0xffffff,0x6677aa,1.2);s.add(l);const ground=new THREE.Mesh(new THREE.BoxGeometry(40,1,40),new THREE.MeshStandardMaterial({color:'#7bc67b'}));ground.position.y=-0.5;s.add(ground);let spawn={x:0,y:2,z:0};(g.objects||[]).forEach(o=>{let geo=o.type==='sphere'?new THREE.SphereGeometry(1,16,16):new THREE.BoxGeometry(1,1,1);const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:o.color||'#5577ff'}));m.position.set(o.position.x,o.position.y,o.position.z);m.scale.set(o.scale.x,o.scale.y,o.scale.z);s.add(m);if(o.type==='spawn')spawn=o.position;});const avatar=new THREE.Mesh(new THREE.BoxGeometry(1,2,1),new THREE.MeshStandardMaterial({color:'#ffcc77'}));avatar.position.set(spawn.x,spawn.y,spawn.z);s.add(avatar);c.position.set(avatar.position.x+6,avatar.position.y+6,avatar.position.z+6);const keys={};onkeydown=(e)=>keys[e.key.toLowerCase()]=true;onkeyup=(e)=>keys[e.key.toLowerCase()]=false;let vy=0;function rs(){const w=editorCanvas.clientWidth,h=450;r.setSize(w,h);c.aspect=w/h;c.updateProjectionMatrix()}onresize=rs;rs();function an(){requestAnimationFrame(an);const sp=.12;if(keys.w)avatar.position.z-=sp;if(keys.s)avatar.position.z+=sp;if(keys.a)avatar.position.x-=sp;if(keys.d)avatar.position.x+=sp;if(keys[' ' ]&&avatar.position.y<=1.01)vy=.22;vy-=.01;avatar.position.y+=vy;if(avatar.position.y<1){avatar.position.y=1;vy=0;}c.lookAt(avatar.position);c.position.lerp(new THREE.Vector3(avatar.position.x+6,avatar.position.y+6,avatar.position.z+6),0.1);r.render(s,c)}an();</script></body></html>
